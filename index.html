<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nami AI | Algerian Market Specialist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="logo-container">
            <div class="logo-box">N</div>
            <div class="brand-name">Nami AI</div>
        </div>
        <button class="new-chat-btn" id="newChatBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Chat
        </button>
        <div class="chat-history" id="chatHistory"></div>
        <div class="status-indicator">
            <div class="dot"></div>
            <span>System Online</span>
        </div>
    </aside>

    <main class="main-chat">
        <header class="topbar">
            <button class="hamburger" id="menuToggle">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <div class="chat-title" id="currentTitle">New Chat</div>
            <div style="width:24px"></div>
        </header>

        <section class="chat-window" id="chatWindow">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo">N</div>
                <h1 class="welcome-title">Welcome to Nami AI</h1>
                <p class="welcome-tagline">Algerian Market Specialist 🇩🇿</p>
                <div class="suggested-chips">
                    <div class="chip" onclick="handleChipClick(this)">
                        <span>📝</span>
                        <div>Latest startup regulations in Algeria?</div>
                    </div>
                    <div class="chip" onclick="handleChipClick(this)">
                        <span>🛒</span>
                        <div>E-commerce commerce law overview</div>
                    </div>
                    <div class="chip" onclick="handleChipClick(this)">
                        <span>📈</span>
                        <div>Top growing sectors in Algeria 2025</div>
                    </div>
                    <div class="chip" onclick="handleChipClick(this)">
                        <span>🏛️</span>
                        <div>How to register a SARL?</div>
                    </div>
                </div>
            </div>
            <div id="messageList"></div>
        </section>

        <footer class="input-container">
           <div class="input-wrapper">
              <div class="file-badge" id="fileBadge" style="display:none">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                <span id="fileName"></span>
                <button onclick="clearFile()" title="Remove">✕</button>
              </div>
              <textarea id="userInput" placeholder="Ask Nami anything about the Algerian market..." rows="1"></textarea>
              <div class="controls">
                <span class="hint">Shift+Enter for new line</span>
                <div style="display:flex;gap:8px;align-items:center">
                  <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none">
                  <button class="attach-btn" id="attachBtn" title="Attach file">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                  </button>
                  <button class="send-btn" id="sendBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                  </button>
                </div>
              </div>
            </div>
            </div>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
