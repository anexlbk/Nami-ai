<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nami AI — Algerian Marketing Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-icon">N</div>
      <div>
        <div class="logo-text">Nami <span>AI</span></div>
      </div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Chat
    </button>

    <div class="history-label">Recent</div>
    <div class="history-list" id="history-list"></div>

    <div class="sidebar-footer">
      <div class="status-pill">
        <div class="status-dot"></div>
        Nami AI · Online
      </div>
    </div>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Topbar -->
    <div class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="topbar-title" id="topbar-title"><span>Nami AI</span> · New Chat</div>
    </div>

    <!-- Chat Window -->
    <div id="chat-window"></div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-wrapper">
        <textarea
          id="user-input"
          rows="1"
          placeholder="Ask about Algerian marketing, law, startups..."
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button id="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Nami AI · Algerian Market Specialist · Shift+Enter for new line</div>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
